name: Tag on merge to main

# Automatically creates a version tag when a PR is merged into main,
# reading the version from package.json. This triggers the Release workflow.
#
# Flow: PR merged → this workflow reads version → creates tag vX.Y.Z →
#       Release workflow detects tag → builds .msi → uploads to GitHub release

on:
  pull_request:
    branches: [main]
    types: [closed]

permissions:
  contents: write

jobs:
  tag:
    # Only run when the PR was actually merged (not just closed)
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from package.json
        id: version
        run: echo "value=v$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        id: tag_exists
        run: |
          if git ls-remote --tags origin "${{ steps.version.outputs.value }}" | grep -q .; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag
        if: steps.tag_exists.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.value }} ${{ github.sha }}
          git push origin ${{ steps.version.outputs.value }}
