<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Productivity Challenge</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      font-size: 13px;
      width: 240px;
      padding: 12px 16px;
      background: #18181b;
      color: #e4e4e7;
      margin: 0;
    }
    h1 { font-size: 14px; margin: 0 0 8px; color: #fff; }
    .status { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot.connected    { background: #22c55e; }
    .dot.disconnected { background: #71717a; }
    .url { font-size: 11px; color: #71717a; word-break: break-all; margin-top: 4px; }
    .note { font-size: 11px; color: #52525b; margin-top: 10px; line-height: 1.4; }
  </style>
</head>
<body>
  <h1>Time Tracker</h1>
  <div class="status">
    <div class="dot" id="dot"></div>
    <span id="statusText">Checking…</span>
  </div>
  <div class="url" id="currentUrl"></div>
  <div class="note">
    The extension automatically reports your active tab to the local tracker.
    Open the Productivity Challenge app to start tracking.
  </div>
  <script src="popup.js"></script>
</body>
</html>
